<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 20px; background: #f5f6f8; font-family: "Instrument Sans", system-ui, sans-serif; }
</style>
</head>
<body>
<div style="width:392px;background:#fafbfc;border:1px solid #e6e8ec;border-radius:16px;overflow:hidden;padding-bottom:4px">
  <div style="display:flex;gap:2px;padding:0 4px;border-bottom:1px solid #eef0f3">
    <span style="padding:11px 11px 10px;font:600 12.5px/1 Instrument Sans,system-ui;color:#1a1c20;border-bottom:2px solid oklch(0.55 0.13 255)">Chat</span>
    <span style="padding:11px 11px 10px;font:500 12.5px/1 Instrument Sans,system-ui;color:#868b95">Review</span>
    <span style="padding:11px 11px 10px;font:500 12.5px/1 Instrument Sans,system-ui;color:#868b95">History</span>
  </div>
  <!-- composer -->
          <div style="flex: none; padding: 12px 14px 14px; border-top: 1px solid #eef0f3;">
            <div style="background: #fff; border: 1px solid #d9d7fb; border-radius: 13px; padding: 11px 12px; box-shadow: 0 6px 16px -12px rgba(86,97,201,.4);">
              <div style="font: 400 13px/1.4 'Instrument Sans'; color: #a3a8b2; margin-bottom: 10px;">Ask about this document, or run a skill…</div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font: 500 11px/1 'Instrument Sans'; color: #868b95; border: 1px solid #e6e8ec; border-radius: 7px; padding: 5px 9px;">＋ Skill</span>
                <span style="font: 500 11px/1 'Instrument Sans'; color: #868b95; border: 1px solid #e6e8ec; border-radius: 7px; padding: 5px 9px;">@ Mention</span>
                <span style="margin-left: auto; width: 28px; height: 28px; border-radius: 8px; background: oklch(0.55 0.13 255); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px;">↑</span>
              </div>
            </div>
          </div>
        </div>
</div>

</html>
