<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #e7eaee; font-family: 'Instrument Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div style="padding: 40px;">
  <div style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #a3a8b2; margin-bottom: 12px;">Comp: 4b Clean identity reading column</div>
  <div data-screen-label="Clean identity" style="width: 600px; height: 448px; background: #fff; border: 1px solid #d7dae0; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 4px rgba(20,22,28,.05), 0 24px 50px -28px rgba(20,22,28,.34); padding: 40px 38px;">
    <div style="display: flex;">
      <div style="width: 26px; flex: none;"></div>
      <div style="flex: 1;">
        <h1 style="font-family: 'Instrument Sans', sans-serif; font-weight: 600; font-size: 30px; line-height: 1.12; letter-spacing: -0.02em; color: #14161a; margin: 0 0 6px;">Weekly Operating Summary</h1>
        <div style="font: 400 12px/1 'IBM Plex Mono'; color: #a3a8b2; margin-bottom: 26px;">Week 24 · bound to metrics.csv</div>
      </div>
    </div>
    <div style="display: flex; margin-bottom: 4px;"><div style="width: 26px; flex: none;"></div><h2 style="font-family: 'Instrument Sans', sans-serif; font-weight: 600; font-size: 16px; color: #1a1c20; margin: 0 0 10px;">Highlights</h2></div>
    <div style="display: flex; margin-bottom: 22px;">
      <div style="width: 26px; flex: none; display: flex; justify-content: center; padding-top: 8px;"><span style="width: 8px; height: 8px; border-radius: 50%; background: oklch(0.55 0.13 255);"></span></div>
      <p style="flex: 1; font-family: 'Instrument Sans', sans-serif; font-size: 15.5px; line-height: 1.7; color: #26292f; margin: 0;">Revenue grew <span style="color: #4650b8; border-bottom: 2px dotted #9aa2e0;">+18%</span> to <span style="color: #4650b8; border-bottom: 2px dotted #9aa2e0;">$48.6k MRR</span>, on <span style="color: #4650b8; border-bottom: 2px dotted #9aa2e0;">427</span> new signups.</p>
    </div>
    <div style="display: flex; margin-bottom: 4px;"><div style="width: 26px; flex: none;"></div><h2 style="font-family: 'Instrument Sans', sans-serif; font-weight: 600; font-size: 16px; color: #1a1c20; margin: 0 0 10px;">Commentary</h2></div>
    <div style="display: flex;"><div style="width: 26px; flex: none;"></div><p style="flex: 1; font-family: 'Instrument Sans', sans-serif; font-size: 15.5px; line-height: 1.7; color: #26292f; margin: 0;">Growth accelerated sharply this week, continuing the climb seen since early Q2.</p></div>
  </div>
</div>
</body>
</html>
